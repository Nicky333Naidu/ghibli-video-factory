name: Run Video Factory

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        cd ghibli-video-factory && pip install -r requirements.txt

    - name: Run Video Factory Pipeline
      run: |
        cd ghibli-video-factory && python main.py

    - name: Upload Finished Video Artifact
      uses: actions/upload-artifact@v4
      with:
        name: final-ghibli-video
        path: ghibli-video-factory/output.mp4
